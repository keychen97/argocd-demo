name: CI/CD - Build, Push, Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ checkout 原始程式
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 登入 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & Push Docker image
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-fastapi:latest
            ${{ secrets.DOCKER_USERNAME }}/docker-fastapi:${{ github.sha }}

      # 4️⃣ 更新 Argo CD config repo
      - name: Update Config Repo
        run: |
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/keychen97/argocd-config.git
          
          cd argocd-config

          # 更新 image tag
          sed -i "s|image: .*/docker-fastapi:.*|image: ${{ secrets.DOCKER_USERNAME }}/docker-fastapi:${{ github.sha }}|" deployment.yaml

          # git 設定
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # commit + push
          git add deployment.yaml
          git commit -m "chore: update image to ${{ github.sha }}"
          git push
